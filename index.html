<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daminī Codesphere</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>

<style>
body, html{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Inter',sans-serif;
}

/* Full-screen AI Orb container */
#aiOrbContainer{
  width:100%;
  height:100vh;
  position:relative;
}

/* Optional: overlay text/buttons on top */
.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  color:#fff;
  z-index:10;
}

.overlay h1{
  font-family:'Orbitron';
  font-size:3rem;
  margin-bottom:20px;
}

.overlay .btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border-radius:50px;
  background:#8b5cf6;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  transition:.3s;
}

.overlay .btn:hover{
  box-shadow:0 0 25px rgba(139,92,246,0.5);
}
</style>
</head>
<body>

<div id="aiOrbContainer"></div>

<div class="overlay">
  <h1>Daminī Codesphere AI</h1>
  <a href="https://primisai.vercel.app" class="btn" target="_blank">Primis AI</a>
  <a href="https://daniai.vercel.app/" class="btn" target="_blank">Dani AI</a>
  <a href="https://dani-search.vercel.app" class="btn" target="_blank">Dani Search</a>
</div>

<script>
// Set up scene
const container = document.getElementById('aiOrbContainer');
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 2000);
camera.position.z = 200;

// Renderer
const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// Stars
const starGeometry = new THREE.BufferGeometry();
const starVertices = [];
for(let i=0;i<5000;i++){
  starVertices.push(
    THREE.MathUtils.randFloatSpread(2000),
    THREE.MathUtils.randFloatSpread(2000),
    THREE.MathUtils.randFloatSpread(2000)
  );
}
starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const starMaterial = new THREE.PointsMaterial({color:0xffffff, size:1});
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// AI Orb
const orbGeometry = new THREE.SphereGeometry(50,64,64);
const orbMaterial = new THREE.MeshStandardMaterial({
  color:0xffffff,
  emissive:0x8b5cf6,
  emissiveIntensity:1.5,
  roughness:0.2,
  metalness:0.8,
  transparent:true,
  opacity:0.9
});
const aiOrb = new THREE.Mesh(orbGeometry, orbMaterial);
scene.add(aiOrb);

// Lights
const pointLight = new THREE.PointLight(0x8b5cf6,2,500);
pointLight.position.set(50,50,50);
scene.add(pointLight);

// Animation
function animate(){
  requestAnimationFrame(animate);
  stars.rotation.x += 0.0005;
  stars.rotation.y += 0.0005;
  
  aiOrb.rotation.y += 0.004;
  const scale = 1 + Math.sin(Date.now()*0.002)*0.08;
  aiOrb.scale.set(scale, scale, scale);
  
  renderer.render(scene,camera);
}
animate();

// Responsive
window.addEventListener('resize',()=>{
  camera.aspect = container.clientWidth/container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth,container.clientHeight);
});
</script>

</body>
</html>
